# Local development without GPU — uses mock AI services
# Usage: docker compose -f docker-compose.local.yml up
services:
  mock-ai:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: memoctopus-mock-ai
    entrypoint: []
    command: ["uvicorn", "mock_services:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8005:8000"
    networks:
      - memoctopus-network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: memoctopus-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-memoctopus}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-memoctopus}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - memoctopus-network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: memoctopus-backend
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-memoctopus}?sslmode=disable
      TRANSCRIPTION_BASE_URL: http://mock-ai:8000
      VLLM_BASE_URL: http://mock-ai:8000/v1
      VLLM_MODEL: mock-model
    ports:
      - "8002:8000"
    depends_on:
      postgres:
        condition: service_healthy
      mock-ai:
        condition: service_started
    networks:
      - memoctopus-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: memoctopus-frontend
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-memoctopus}?sslmode=disable
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-dev-secret-key-for-local}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      TRUSTED_ORIGINS: ${TRUSTED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      BACKEND_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - memoctopus-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  memoctopus-network:
    driver: bridge
